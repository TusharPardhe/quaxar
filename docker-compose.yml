services:
  quaxar:
    build: .
    container_name: quaxar
    restart: unless-stopped
    ports:
      - "5005:5005"   # RPC
      - "6006:6006"   # WebSocket
      - "51235:51235" # Peer protocol
    volumes:
      - xrpld-data:/var/lib/xrpld
      - ./xrpld.cfg:/etc/xrpld/xrpld.cfg:ro
      - ./validators.txt:/etc/xrpld/validators.txt:ro
    user: "0:0"  # Run as root to avoid permission issues with volume
    deploy:
      resources:
        limits:
          memory: 16G
    healthcheck:
      test: ["CMD", "quaxar", "health", "--rpc-url", "http://127.0.0.1:5005"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  xrpld-data:
