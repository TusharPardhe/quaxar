[server]
port_rpc_admin_local
port_ws_admin_local
port_peer

[port_rpc_admin_local]
port = 5005
ip = 0.0.0.0
admin = 0.0.0.0
protocol = http

[port_ws_admin_local]
port = 6006
ip = 0.0.0.0
admin = 0.0.0.0
protocol = ws
send_queue_limit = 500

[port_peer]
port = 51235
ip = 0.0.0.0
protocol = peer

[node_size]
medium

[node_db]
type = NuDB
path = /var/lib/xrpld/db/nudb

[database_path]
/var/lib/xrpld/db

[ledger_history]
256

[debug_logfile]
/var/lib/xrpld/debug.log

[rpc_startup]
{ "command": "log_level", "severity": "debug" }

[ssl_verify]
0

[network_id]
1

[ips]
s.altnet.rippletest.net 51235

[validators_file]
validators-testnet.txt
