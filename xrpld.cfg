[server]
port_rpc_admin_local
port_ws_admin_local
port_peer

[port_rpc_admin_local]
port = 5005
ip = 127.0.0.1
admin = 127.0.0.1
protocol = http

[port_ws_admin_local]
port = 6006
ip = 127.0.0.1
admin = 127.0.0.1
protocol = ws
send_queue_limit = 500

[port_peer]
port = 51235
ip = 0.0.0.0
protocol = peer

[node_size]
medium

[node_db]
type = NuDB
path = /var/lib/xrpld/db/nudb
nudb_block_size = 4096
online_delete = 512
advisory_delete = 0

[database_path]
/var/lib/xrpld/db

[ledger_history]
256

[validators_file]
validators.txt

[debug_logfile]
/var/lib/xrpld/debug.log

[rpc_startup]
{ "command": "log_level", "severity": "warning" }

[ssl_verify]
1

[ips]
s1.ripple.com 51235
s2.ripple.com 51235
